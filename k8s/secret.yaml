---
apiVersion: v1
kind: Secret
metadata:
  name: showroom-ai-assistant-secrets
  labels:
    app: showroom-ai-assistant
type: Opaque
stringData:
  # OpenAI API Key (use when llm.engine = "openai" in assistant-config.yaml)
  OPENAI_API_KEY: "PLACEHOLDER_OPENAI_API_KEY_REPLACE_ME"
  # Optional: OpenAI Base URL (use when llm.endpoint is set for OpenAI)
  OPENAI_BASE_URL: ""

  # vLLM API Token (use when llm.engine = "vllm" in assistant-config.yaml)
  VLLM_API_TOKEN: "PLACEHOLDER_VLLM_API_TOKEN_REPLACE_ME"
  # Optional: vLLM URL (use when llm.endpoint is set for vLLM)
  VLLM_URL: ""
  # Optional: vLLM Max Tokens
  VLLM_MAX_TOKENS: ""
  # Optional: vLLM TLS Verify (true/false)
  VLLM_TLS_VERIFY: ""

  # Ollama API Key (use when llm.engine = "ollama" in assistant-config.yaml)
  OLLAMA_API_KEY: "PLACEHOLDER_OLLAMA_API_KEY_REPLACE_ME"
  # Optional: Ollama URL (use when llm.endpoint is set for Ollama)
  OLLAMA_URL: ""

  # Tavily Search API Key
  TAVILY_SEARCH_API_KEY: "TAVILY_API_KEY_REPLACE_ME"
